name: Build and deploy Node.js app to Azure Web App - mediashare-app

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone output
        run: |
          # Create the structure for the release folder
          mkdir -p release/.next/static
          
          # Copy standalone server files (including hidden .next folder inside standalone)
          cp -r .next/standalone/. release/
          
          # Copy static assets and public folder
          cp -r .next/static/. release/.next/static/
          cp -r public release/public

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release
          include-hidden-files: true # ✅ CRITICAL: Ensures the .next folder is uploaded

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_260978F58A6C4FE6AF03FA87C5630EA1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_21548820ADEF4A4F9D11B7AAE1864A42 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4910DE0E55814323A9F8477B0C6D624F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: mediashare-app
          slot-name: Production
          package: release
